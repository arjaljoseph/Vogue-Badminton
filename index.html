<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow-x:hidden}
body{
  font-family:'Orbitron','Segoe UI',system-ui,sans-serif;
  background:#050510;
  color:#ffffff;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  overscroll-behavior:none;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(circle at 15% 30%, rgba(120,0,200,0.12) 0%, transparent 50%),
    radial-gradient(circle at 85% 15%, rgba(0,180,230,0.08) 0%, transparent 45%),
    radial-gradient(circle at 50% 85%, rgba(200,0,100,0.07) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}
#root{min-height:100vh;min-height:100dvh;position:relative;z-index:1}
@media(max-width:480px){body{font-size:14px}select,input{font-size:16px!important}}
#fs-btn{
  position:fixed;bottom:16px;right:16px;z-index:9999;
  width:44px;height:44px;border-radius:12px;
  border:1px solid rgba(0,210,255,0.3);
  background:rgba(10,10,20,0.9);
  color:#0ff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(0,210,255,0.15);
  animation:neonPulse 3s ease-in-out infinite;
}
@media(display-mode:standalone){#fs-btn{display:none!important}}
@media(display-mode:fullscreen){#fs-btn{display:none!important}}
::selection{background:rgba(0,210,255,0.3);color:#fff}
input,select{
  font-family:'Orbitron','Segoe UI',sans-serif;
  background:rgba(8,8,20,0.95)!important;
  border:1px solid rgba(0,210,255,0.2)!important;
  color:#ffffff!important;
}
input:focus,select:focus{
  border-color:rgba(0,210,255,0.5)!important;
  box-shadow:0 0 15px rgba(0,210,255,0.15)!important;
  outline:none;
}
input::placeholder{color:rgba(255,255,255,0.3)}
button{transition:all 0.2s ease;font-family:'Orbitron','Segoe UI',sans-serif}
button:active{transform:scale(0.96)}
@keyframes neonPulse{
  0%,100%{box-shadow:0 0 8px rgba(0,210,255,0.15)}
  50%{box-shadow:0 0 16px rgba(0,210,255,0.3)}
}
@keyframes wcFloat0{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wcFloat1{0%,100%{transform:translateY(-2px)}50%{transform:translateY(-10px)}}
@keyframes wcFloat2{0%,100%{transform:translateY(-5px)}50%{transform:translateY(3px)}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
::-webkit-scrollbar-thumb{background:rgba(0,210,255,0.2);border-radius:3px}
</style>

const AVATARS = [AVATAR_1, AVATAR_2, AVATAR_3, AVATAR_4];


const SKILL_LEVELS = ["Beginner", "Intermediate", "Advanced", "Strong"];
const SKILL_VAL = { Beginner: 1, Intermediate: 2, Advanced: 3, Strong: 4 };
const GENDERS = ["Male", "Female"];
const MATCH_TYPES = ["Mens Doubles", "Womens Doubles", "Mixed Doubles"];
const MIN_GAMES = 3;

const VALID_SKILL_PAIRS = [
  ["Beginner","Beginner"],["Intermediate","Intermediate"],["Advanced","Advanced"],["Strong","Strong"],
  ["Beginner","Advanced"],["Beginner","Intermediate"],["Intermediate","Advanced"],["Advanced","Strong"],["Strong","Intermediate"]
];
function isValidSkillPair(s1, s2) {
  return VALID_SKILL_PAIRS.some(([a,b]) => (s1===a&&s2===b)||(s1===b&&s2===a));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function fmtTime(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`; }
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }
function initials(n) { return n.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2); }
function pairKey(a, b) { return [a, b].sort().join("+"); }
function pColor(name) { const PCOLS=["#3b82f6","#8b5cf6","#10b981","#f59e0b","#ef4444","#06b6d4","#d946ef","#6366f1","#f97316","#14b8a6","#ec4899","#84cc16"]; let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return PCOLS[Math.abs(h)%PCOLS.length]; }
function defaultAvatar(name) { let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return Math.abs(h)%AVATARS.length; }
function byName(a,b){return (a?.name||"").localeCompare((b?.name||""),undefined,{sensitivity:"base"});}

function getAllPairs(players) { const p=[]; for(let i=0;i<players.length;i++) for(let j=i+1;j<players.length;j++) p.push([players[i].id,players[j].id]); return p; }
function makeLevelPairRow(teams){const playersByTeam={};(teams||[]).forEach(t=>{playersByTeam[t.id]="";});return {id:uid(),playersByTeam};}
function ensureLevelPairs(levelPairs,teams,allPlayers){
  const teamIds=new Set((teams||[]).map(t=>t.id));
  const allIds=new Set((allPlayers||[]).map(p=>p.id));
  const rows=(levelPairs||[]).map(r=>{
    const playersByTeam={};
    (teams||[]).forEach(t=>{
      const id=r?.playersByTeam?.[t.id]||"";
      playersByTeam[t.id]=id&&allIds.has(id)?id:"";
    });
    return {id:r?.id||uid(),playersByTeam};
  });
  return rows.length>0?rows:[makeLevelPairRow(teams)];
}
function buildPlayMaps(pool, history, liveGames){
  const pg={}, last={}; (pool||[]).forEach(p=>{pg[p.id]=0;last[p.id]=0;});
  (history||[]).forEach((g,idx)=>{const order=idx+1;[...g.pair1,...g.pair2].forEach(id=>{if(pg[id]!==undefined){pg[id]++;last[id]=order;}});});
  (liveGames||[]).forEach((g,idx)=>{const order=(history||[]).length+idx+1;[...g.pair1,...g.pair2].forEach(id=>{if(pg[id]!==undefined){pg[id]++;last[id]=order;}});});
  return {pg,last};
}
function choosePartner(anchor, candidates, historySet, pg, last, excludeIds){
  if(!anchor) return null;
  const src=(candidates||[]).filter(p=>p&&p.id!==anchor.id&&!excludeIds.has(p.id)&&isValidSkillPair(p.skill,anchor.skill));
  if(src.length===0) return null;
  const fresh=src.filter(p=>!historySet.has(pairKey(anchor.id,p.id)));
  const pool=fresh.length>0?fresh:src;
  pool.sort((a,b)=>{const ga=pg[a.id]||0,gb=pg[b.id]||0;if(ga!==gb) return ga-gb;return (last[a.id]||0)-(last[b.id]||0);});
  return pool[0]||null;
}
function pickForcedAnchors(levelPairs, teams, poolById, busyIds){
  const teamOrder=(teams||[]).map(t=>t.id);
  for(const row of (levelPairs||[])){
    const picks=teamOrder.map(tid=>row?.playersByTeam?.[tid]).filter(Boolean).map(pid=>poolById[pid]).filter(Boolean).filter(p=>!busyIds.has(p.id));
    if(picks.length<2) continue;

function CourtScoreboard({game,teams,dispatch,courtName,wildcards}) {

function StandingsTable({teams,gameHistory,wildcards}) {

function ScheduleTab({teams,wildcards,manualQueue,dispatch,courts,liveGames}) {
  const allP=[...teams.flatMap(t=>t.players),...(wildcards||[])];
  const [p1a,setP1a]=useState("");const [p1b,setP1b]=useState("");
  const [p2a,setP2a]=useState("");const [p2b,setP2b]=useState("");
  const [mt,setMt]=useState("Mixed Doubles");
  const busyIds=new Set();liveGames.forEach(g=>{[...g.pair1,...g.pair2].forEach(id=>busyIds.add(id));});
  const openCourt=courts?.find(c=>c.status==="open");
  const getP=id=>allP.find(p=>p.id===id);
  const sel=[p1a,p1b,p2a,p2b].filter(Boolean);
  const handleAdd=()=>{if(p1a&&p1b&&p2a&&p2b){dispatch({type:"ADD_MANUAL_MATCH",pair1:[p1a,p1b],pair2:[p2a,p2b],matchType:mt});setP1a("");setP1b("");setP2a("");setP2b("");}};
  const MTB=({m:mm})=>{const active=mt===mm;const c=mm==="Mens Doubles"?"60,130,255":mm==="Womens Doubles"?"236,72,153":"168,85,247";return <button onClick={()=>setMt(mm)} style={{padding:"4px 10px",borderRadius:99,border:active?"1px solid rgba("+c+",0.5)":"1px solid rgba(255,255,255,0.06)",background:active?"rgba("+c+",0.15)":"transparent",color:"#ffffff",fontSize:10,fontWeight:700,cursor:"pointer"}}>{mm==="Mens Doubles"?"MDD":mm==="Womens Doubles"?"WDD":"MXD"}</button>;};
  const Sel=({val,set,label})=><select value={val} onChange={e=>set(e.target.value)} style={{padding:"6px 8px",borderRadius:8,border:"1px solid rgba(0,210,255,0.2)",fontSize:12,background:"rgba(8,8,20,0.95)",color:"#fff",flex:1,minWidth:80}}><option value="">{label}</option>{allP.filter(p=>!sel.includes(p.id)||p.id===val).sort(byName).map(p=><option key={p.id} value={p.id}>{p.name} ({p.gender==="Male"?"M":"F"})</option>)}</select>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Card>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#ffffff"}}>Manual Scheduling</div>
        <div style={{display:"flex",gap:4,marginBottom:10}}><MTB m="Mens Doubles"/><MTB m="Womens Doubles"/><MTB m="Mixed Doubles"/></div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
          <Sel val={p1a} set={setP1a} label="Pair 1 #1"/><Sel val={p1b} set={setP1b} label="Pair 1 #2"/>
          <span style={{fontSize:12,fontWeight:900,color:"rgba(255,255,255,0.3)"}}>VS</span>
          <Sel val={p2a} set={setP2a} label="Pair 2 #1"/><Sel val={p2b} set={setP2b} label="Pair 2 #2"/>
        </div>
        <button onClick={handleAdd} disabled={!p1a||!p1b||!p2a||!p2b} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"1px solid rgba(0,210,255,0.3)",background:p1a&&p1b&&p2a&&p2b?"rgba(0,210,255,0.12)":"rgba(255,255,255,0.03)",color:"#ffffff",fontWeight:700,fontSize:13,cursor:p1a&&p1b&&p2a&&p2b?"pointer":"default",opacity:p1a&&p1b&&p2a&&p2b?1:0.4}}>+ Add to Schedule</button>
      </Card>
      <div style={{fontWeight:700,fontSize:14,color:"#ffffff"}}>Scheduled Matches ({(manualQueue||[]).length})</div>
      {(manualQueue||[]).length===0&&<div style={{textAlign:"center",padding:20,color:"rgba(255,255,255,0.4)",fontSize:12,border:"1px dashed rgba(0,210,255,0.15)",borderRadius:12}}>No matches scheduled yet.</div>}
      {(manualQueue||[]).map((match,idx)=>{
        const pa1=getP(match.pair1[0]),pa2=getP(match.pair1[1]),pb1=getP(match.pair2[0]),pb2=getP(match.pair2[1]);
        const anyBusy=match.pair1.concat(match.pair2).some(id=>busyIds.has(id));
        return (
          <div key={match.id} style={{borderRadius:12,overflow:"hidden",border:"1px solid rgba(0,210,255,0.1)",background:"rgba(12,12,30,0.88)",animation:"wcFloat"+(idx%3)+" 3.5s ease-in-out infinite",animationDelay:idx*0.2+"s"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",background:"rgba(20,20,45,0.95)",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontSize:11,fontWeight:800,color:"#ffffff"}}>MATCH {idx+1}</span>
              <MatchTypeBadge type={match.matchType}/>
              {openCourt&&!anyBusy&&<button onClick={()=>dispatch({type:"START_MANUAL_MATCH",matchId:match.id,courtId:openCourt.id})} style={{padding:"2px 8px",borderRadius:6,border:"1px solid rgba(0,255,140,0.3)",background:"rgba(0,255,140,0.12)",color:"#ffffff",fontSize:9,fontWeight:700,cursor:"pointer"}}>{openCourt.name}</button>}
              <div style={{flex:1}}/>
              <button onClick={()=>dispatch({type:"MOVE_MANUAL_MATCH",id:match.id,dir:"up"})} disabled={idx===0} style={{padding:"2px 6px",borderRadius:4,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)",color:idx===0?"rgba(255,255,255,0.2)":"#fff",fontSize:10,cursor:"pointer"}}>{"\u2191"}</button>
              <button onClick={()=>dispatch({type:"MOVE_MANUAL_MATCH",id:match.id,dir:"down"})} disabled={idx===(manualQueue||[]).length-1} style={{padding:"2px 6px",borderRadius:4,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)",color:idx===(manualQueue||[]).length-1?"rgba(255,255,255,0.2)":"#fff",fontSize:10,cursor:"pointer"}}>{"\u2193"}</button>
              <button onClick={()=>dispatch({type:"REMOVE_MANUAL_MATCH",id:match.id})} style={{padding:"2px 6px",borderRadius:4,border:"1px solid rgba(255,60,60,0.2)",background:"rgba(255,60,60,0.08)",color:"#fff",fontSize:10,cursor:"pointer"}}>X</button>
            </div>
            <div style={{display:"flex"}}>
              <div style={{flex:1,padding:"10px 12px",borderRight:"1px solid rgba(255,255,255,0.04)"}}>
                <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",marginBottom:4}}>PAIR 1</div>
                <div style={{fontSize:13,fontWeight:800,color:"#ffffff",textTransform:"uppercase"}}>{pa1?.name||"?"}</div>
                <div style={{fontSize:13,fontWeight:800,color:"#ffffff",textTransform:"uppercase"}}>{pa2?.name||"?"}</div>
              </div>
              <div style={{flex:1,padding:"10px 12px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",marginBottom:4}}>PAIR 2</div>
                <div style={{fontSize:13,fontWeight:800,color:"#ffffff",textTransform:"uppercase"}}>{pb1?.name||"?"}</div>
                <div style={{fontSize:13,fontWeight:800,color:"#ffffff",textTransform:"uppercase"}}>{pb2?.name||"?"}</div>
              </div>
            </div>
            {anyBusy&&<div style={{padding:"4px 12px",background:"rgba(255,170,0,0.08)",fontSize:10,color:"rgba(255,255,255,0.5)"}}>Some players currently playing</div>}
          </div>);
      })}
    </div>);
}

function QueueFeeCalculatorCard({teams,wildcards,courts}) {
  const [courtFeePerCourt,setCourtFeePerCourt]=useState(0);
  const [courtCount,setCourtCount]=useState((courts||[]).length||1);
  const [shuttleTubes,setShuttleTubes]=useState(0);
  const [shuttleCostPerTube,setShuttleCostPerTube]=useState(0);
  const players=[...teams.flatMap(t=>t.players),...(wildcards||[])].sort(byName);
  const activeCount=players.length||1;
  const courtCost=Math.max(0,Number(courtFeePerCourt)||0)*Math.max(0,Number(courtCount)||0);
  const shuttleCost=Math.max(0,Number(shuttleTubes)||0)*Math.max(0,Number(shuttleCostPerTube)||0);
  const totalCost=courtCost+shuttleCost;
  const feePerPlayer=activeCount>0?totalCost/activeCount:0;
  return (
    <Card>
      <div style={{fontWeight:700,fontSize:15,marginBottom:10,color:"#ffffff"}}>Queue Fee Calculator</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:8}}>
        <div><div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:4}}>Court Fee / Court</div><input type="number" min="0" value={courtFeePerCourt} onChange={e=>setCourtFeePerCourt(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.02)",color:"#fff"}}/></div>
        <div><div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:4}}>Number of Courts</div><input type="number" min="0" value={courtCount} onChange={e=>setCourtCount(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.02)",color:"#fff"}}/></div>
        <div><div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:4}}>Shuttles (Tubes) Used</div><input type="number" min="0" value={shuttleTubes} onChange={e=>setShuttleTubes(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.02)",color:"#fff"}}/></div>
        <div><div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:4}}>Cost / Tube</div><input type="number" min="0" value={shuttleCostPerTube} onChange={e=>setShuttleCostPerTube(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.02)",color:"#fff"}}/></div>
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:10,fontSize:12,color:"#fff"}}>
        <span>Total Cost: <b>{totalCost.toFixed(2)}</b></span>
        <span>Players: <b>{players.length}</b></span>
        <span>Fee / Player: <b>{feePerPlayer.toFixed(2)}</b></span>
      </div>
    </Card>
  );
}

function HistoryTab({teams,wildcards,manualQueue,liveGames,gameHistory}) {
  const allP=[...teams.flatMap(t=>t.players),...(wildcards||[])];
  const getP=id=>allP.find(p=>p.id===id);
  const fmtPair=pair=>pair.map(pid=>getP(pid)?.name||"?").join(" / ");
  const rows=[
    ...(manualQueue||[]).map((m,idx)=>({id:m.id,status:"Scheduled",mode:"Manual",matchType:m.matchType,pair1:m.pair1,pair2:m.pair2,time:idx})),
    ...(liveGames||[]).map(g=>({id:g.id,status:"Live",mode:(g.mode||"queue")==="tournament"?"Tournament":"Queue",matchType:g.matchType,pair1:g.pair1,pair2:g.pair2,time:g.startedAt||0})),
    ...(gameHistory||[]).map(g=>({id:g.id,status:"Completed",mode:(g.mode||"queue")==="tournament"?"Tournament":"Queue",matchType:g.matchType,pair1:g.pair1,pair2:g.pair2,time:g.endedAt||g.startedAt||0,score:`${g.totalPts1||0}-${g.totalPts2||0}`})),
  ];
  rows.sort((a,b)=>(b.time||0)-(a.time||0));
  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:15,color:"#ffffff"}}>Pairing History</div>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>{rows.length} entries</span>
      </div>
      {rows.length===0&&<div style={{textAlign:"center",padding:16,color:"rgba(255,255,255,0.45)",fontSize:12,border:"1px dashed rgba(255,255,255,0.14)",borderRadius:10}}>No pairing history yet.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {rows.map((r,idx)=><div key={r.id+"-"+idx} style={{padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:10,fontWeight:800,color:"#fff",padding:"2px 8px",borderRadius:99,background:r.status==="Completed"?"rgba(34,197,94,0.18)":r.status==="Live"?"rgba(250,204,21,0.18)":"rgba(0,210,255,0.18)"}}>{r.status}</span>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.75)"}}>{r.mode}</span>
            {r.matchType&&<MatchTypeBadge type={r.matchType}/>}
            {r.score&&<span style={{fontSize:10,color:"rgba(255,255,255,0.75)"}}>Score {r.score}</span>}
          </div>
          <div style={{fontSize:12,color:"#fff",fontWeight:700,marginTop:6}}>{fmtPair(r.pair1)} vs {fmtPair(r.pair2)}</div>
        </div>)}
      </div>
    </Card>
  );
}

          <button onClick={()=>dispatch({type:"CLEAR_HISTORY"})} style={{padding:"8px 12px",borderRadius:8,border:"1px solid rgba(168,85,247,0.35)",background:"rgba(168,85,247,0.12)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Clear Game History</button>
          <button onClick={()=>courts.forEach(c=>dispatch({type:"RESET_COURT",courtId:c.id}))} style={{padding:"8px 12px",borderRadius:8,border:"1px solid rgba(0,210,255,0.35)",background:"rgba(0,210,255,0.12)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Reset All Courts</button>
          <button onClick={()=>dispatch({type:"MARK_ALL_PAID"})} style={{padding:"8px 12px",borderRadius:8,border:"1px solid rgba(34,197,94,0.35)",background:"rgba(34,197,94,0.12)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Mark All Paid</button>
          <button onClick={()=>dispatch({type:"MARK_ALL_UNPAID"})} style={{padding:"8px 12px",borderRadius:8,border:"1px solid rgba(148,163,184,0.35)",background:"rgba(148,163,184,0.12)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Mark All Unpaid</button>
        </div>
        {!canReset&&<div style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,0.55)"}}>Finish live games before Reset Program.</div>}
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:10,fontSize:11,color:"rgba(255,255,255,0.7)"}}>
          <span>Players: {teams.flatMap(t=>t.players).length+(wildcards||[]).length}</span>
          <span>Courts: {(courts||[]).length}</span>
          <span>Scheduled: {(manualQueue||[]).length}</span>
          <span>Completed Games: {(gameHistory||[]).length}</span>
        </div>
      </Card>
      <QueueFeeCalculatorCard teams={teams} wildcards={wildcards} courts={courts}/>
    </div>
  );
}

function PaymentTab({teams,wildcards,paymentStatus,dispatch}) {
  const players=[...teams.flatMap(t=>t.players),...(wildcards||[])].sort(byName);
  const paidCount=players.filter(p=>paymentStatus?.[p.id]).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Card>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:15,color:"#ffffff"}}>Payment Status</div>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.55)"}}>{paidCount}/{players.length} paid</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {players.map(p=>{
            const paid=!!paymentStatus?.[p.id];
            return <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)"}}>
              <Av player={p} size={24} border={false}/>
              <div style={{flex:1,color:"#fff",fontSize:13,fontWeight:700}}>{p.name}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>--</div>
              <button onClick={()=>dispatch({type:"TOGGLE_PLAYER_PAID",playerId:p.id})} style={{padding:"4px 10px",borderRadius:7,border:paid?"1px solid rgba(0,255,140,0.35)":"1px solid rgba(255,180,80,0.35)",background:paid?"rgba(0,255,140,0.12)":"rgba(255,180,80,0.12)",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>{paid?"Paid":"Unpaid"}</button>
            </div>;
          })}
          {players.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>No players available.</div>}
        </div>
      </Card>
    </div>
  );
}

const Card=({children,style,...r})=><div style={{background:"rgba(12,12,30,0.92)",borderRadius:20,border:"1px solid rgba(0,210,255,0.12)",padding:"20px 24px",backdropFilter:"blur(20px)",boxShadow:"0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04)",...style}} {...r}>{children}</div>;

const TABS=[{key:"match",label:"Match",icon:"🏸"},{key:"queue",label:"Queue",icon:"📋"},{key:"players",label:"Players",icon:"✏️"},{key:"teams",label:"Teams",icon:"👥"},{key:"schedule",label:"Schedule",icon:"📅"},{key:"history",label:"History",icon:"🗂️"},{key:"payment",label:"Payment",icon:"💳"},{key:"admin",label:"Admin",icon:"⚙️"},{key:"standings",label:"Stats",icon:"🏆"}];

function BadmintonApp() {
  const [st,dispatch]=useReducer(reducer,init);
  const [tab,setTab]=useState("match");
  const t1=st.teams[0],t2=st.teams[1];
  const mg=st.gameHistory.filter(g=>(g.team1Id===t1?.id&&g.team2Id===t2?.id)||(g.team1Id===t2?.id&&g.team2Id===t1?.id));
  const t1W=mg.filter(g=>(g.team1Id===t1?.id&&g.winner===1)||(g.team2Id===t1?.id&&g.winner===2)).length;
  const t2W=mg.filter(g=>(g.team1Id===t2?.id&&g.winner===1)||(g.team2Id===t2?.id&&g.winner===2)).length;
  const t1S=mg.reduce((s,g)=>s+(g.team1Id===t1?.id?g.setsWon1:g.setsWon2),0);
  const t2S=mg.reduce((s,g)=>s+(g.team1Id===t2?.id?g.setsWon1:g.setsWon2),0);
  const t1P=mg.reduce((s,g)=>s+(g.team1Id===t1?.id?g.totalPts1:g.totalPts2),0);
  const t2P=mg.reduce((s,g)=>s+(g.team1Id===t2?.id?g.totalPts1:g.totalPts2),0);

  return (
    <div style={{fontFamily:"'Orbitron','Segoe UI',system-ui,sans-serif",maxWidth:960,margin:"0 auto",padding:"0 6px 40px"}}>
      <div style={{padding:"12px 14px 8px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",background:"rgba(10,10,25,0.95)",borderRadius:"16px 16px 0 0",marginTop:6,borderBottom:"1px solid rgba(0,210,255,0.1)"}}>
        <div style={{fontSize:"clamp(16px,4vw,20px)",fontWeight:800,color:"#ffffff",whiteSpace:"nowrap",textShadow:"none"}}>🏸 Vogue Badminton Buddies</div>
        <div style={{flex:1}}/>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",padding:"8px 14px",background:"rgba(10,10,25,0.92)",borderRadius:"0 0 16px 16px",borderBottom:"1px solid rgba(0,210,255,0.08)"}}>
        {TABS.map(t=><button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"7px 12px",border:"none",borderRadius:99,cursor:"pointer",fontWeight:tab===t.key?700:600,fontSize:"clamp(11px,2.5vw,13px)",color:tab===t.key?"#ffffff":"rgba(255,255,255,0.8)",background:tab===t.key?"rgba(0,210,255,0.15)":"rgba(255,255,255,0.06)",whiteSpace:"nowrap",transition:"all 0.15s",boxShadow:tab===t.key?"0 0 20px rgba(0,210,255,0.25),0 0 40px rgba(0,210,255,0.08),inset 0 0 12px rgba(0,210,255,0.08)":"none",border:tab===t.key?"1px solid rgba(0,210,255,0.35)":"1px solid rgba(255,255,255,0.04)",flexShrink:0}}><span style={{marginRight:3}}>{t.icon}</span>{t.label}</button>)}
      </div>

      {tab==="match"&&t1&&t2&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"rgba(12,12,30,0.92)",borderRadius:14,border:"1px solid rgba(0,210,255,0.1)"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#ffffff",marginRight:4}}>MODE</span>
            <div onClick={()=>{if(st.liveGames.length===0) dispatch({type:"SET_MODE",mode:st.gameMode==="queue"?"tournament":"queue"});}} style={{width:52,height:26,borderRadius:13,background:st.gameMode==="queue"?"rgba(0,210,255,0.3)":"rgba(168,85,247,0.3)",border:st.gameMode==="queue"?"1px solid rgba(0,210,255,0.5)":"1px solid rgba(168,85,247,0.5)",cursor:st.liveGames.length===0?"pointer":"not-allowed",opacity:st.liveGames.length===0?1:0.6,position:"relative",transition:"all 0.3s"}}>
              <div style={{width:20,height:20,borderRadius:10,background:"#ffffff",position:"absolute",top:2,left:st.gameMode==="queue"?3:29,transition:"left 0.3s",boxShadow:"0 0 8px rgba(0,0,0,0.3)"}}/>
            </div>
            <span style={{fontSize:11,fontWeight:700,color:st.gameMode==="queue"?"rgba(0,210,255,0.9)":"rgba(168,85,247,0.9)"}}>{st.gameMode==="queue"?"QUEUE":"TOURNAMENT"}</span>
            <div style={{flex:1}}/>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>{st.liveGames.length>0?"Finish live games to switch mode":(st.gameMode==="queue"?"Auto-pair from queue":"Manual bracket play")}</span>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={()=>dispatch({type:"ADD_COURT"})} style={{padding:"8px 14px",borderRadius:10,border:"1px solid rgba(0,210,255,0.25)",background:"rgba(20,20,45,0.95)",color:"#ffffff",boxShadow:"0 0 12px rgba(0,210,255,0.08)",fontWeight:600,fontSize:12,cursor:"pointer"}}>+ Court</button>
            {st.courts.filter(c=>c.status==="open").map(c=><button key={c.id} onClick={()=>dispatch({type:"REMOVE_COURT",id:c.id})} style={{padding:"8px 10px",borderRadius:8,border:"1px solid rgba(255,60,60,0.2)",background:"rgba(255,60,60,0.08)",color:"rgba(255,255,255,0.7)",fontWeight:600,fontSize:11,cursor:"pointer"}}>✕ {c.name}</button>)}
            <div style={{flex:1}}/>
            {mg.length>0&&st.liveGames.length===0&&<button onClick={()=>dispatch({type:"END_MATCH",t1Id:t1.id,t2Id:t2.id,t1W,t2W,t1P,t2P,t1S,t2S})} style={{padding:"8px 16px",borderRadius:8,border:"1px solid rgba(255,60,60,0.2)",background:"rgba(255,60,60,0.08)",color:"rgba(255,255,255,0.7)",fontWeight:700,fontSize:12,cursor:"pointer"}}>End match</button>}
          </div>
          {st.courts.map(c=>{
            const lg=st.liveGames.find(g=>g.courtId===c.id);
            if(lg) return <CourtScoreboard key={c.id} game={lg} teams={st.teams} dispatch={dispatch} courtName={c.name} wildcards={st.wildcards}/>;
            return (
              <div key={c.id} onClick={()=>dispatch({type:"START_COURT",courtId:c.id})} style={{borderRadius:16,overflow:"hidden",border:"1px solid rgba(255,255,255,0.06)",background:"rgba(10,15,26,0.92)",cursor:"pointer",transition:"all 0.2s",animation:"wcFloat1 4s ease-in-out infinite",backdropFilter:"blur(12px)",boxShadow:"0 4px 24px rgba(0,0,0,0.3)"}} onMouseOver={e=>{e.currentTarget.style.borderColor="rgba(250,204,21,0.4)";}} onMouseOut={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.06)";}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 16px",background:"rgba(10,15,30,0.95)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:"#64748b"}}/><span style={{fontSize:13,fontWeight:800,color:"rgba(255,255,255,0.55)",textTransform:"uppercase",letterSpacing:"0.08em"}}>{c.name}</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <button onClick={e=>{e.stopPropagation();dispatch({type:"RESET_COURT",courtId:c.id});}} style={{padding:"3px 8px",borderRadius:6,border:"1px solid rgba(255,80,80,0.35)",background:"rgba(255,80,80,0.12)",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>Reset</button>
                    <span style={{fontSize:11,fontWeight:700,color:"#facc15",background:"rgba(250,204,21,0.1)",padding:"2px 10px",borderRadius:99}}>TAP TO START</span>
                  </div>
                </div>
                <div style={{display:"flex"}}>
                  <div style={{flex:1,background:"rgba(153,27,27,0.6)",padding:"14px 14px",display:"flex",flexDirection:"column",gap:6}}>
                    <div style={{fontSize:9,fontWeight:800,color:"rgba(252,165,165,0.5)",textTransform:"uppercase",letterSpacing:"0.12em"}}>{st.gameMode==="queue"?"PAIR 1":t1.name}</div>
                    <div style={{fontSize:14,fontWeight:900,color:"rgba(255,255,255,0.12)",textTransform:"uppercase"}}>PLAYER 1</div>
                    <div style={{fontSize:14,fontWeight:900,color:"rgba(255,255,255,0.12)",textTransform:"uppercase"}}>PLAYER 2</div>
                  </div>
                  <div style={{flex:1,background:"rgba(30,64,175,0.6)",padding:"14px 14px",display:"flex",flexDirection:"column",gap:6}}>
                    <div style={{fontSize:9,fontWeight:800,color:"rgba(147,197,253,0.5)",textTransform:"uppercase",letterSpacing:"0.12em"}}>{st.gameMode==="queue"?"PAIR 2":t2.name}</div>
                    <div style={{fontSize:14,fontWeight:900,color:"rgba(255,255,255,0.12)",textTransform:"uppercase"}}>PLAYER 1</div>
                    <div style={{fontSize:14,fontWeight:900,color:"rgba(255,255,255,0.12)",textTransform:"uppercase"}}>PLAYER 2</div>
                  </div>
                </div>
              </div>);})}
        </div>)}

      {tab==="queue"&&<Card style={{padding:"16px 12px"}}><div style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#ffffff"}}>Pair Queue</div><PairQueue teams={st.teams} gameHistory={st.gameHistory} liveGames={st.liveGames} dispatch={dispatch} courts={st.courts} gameMode={st.gameMode} wildcards={st.wildcards}/></Card>}
      {tab==="players"&&<PlayersTab teams={st.teams} dispatch={dispatch} liveGames={st.liveGames} wildcards={st.wildcards} levelPairs={st.levelPairs}/>}
      {tab==="teams"&&(
        <TeamsTab teams={st.teams} wildcards={st.wildcards} dispatch={dispatch} gameHistory={st.gameHistory}/>
      )}
      {tab==="schedule"&&<ScheduleTab teams={st.teams} wildcards={st.wildcards} manualQueue={st.manualQueue} dispatch={dispatch} courts={st.courts} liveGames={st.liveGames}/>}
      {tab==="history"&&<HistoryTab teams={st.teams} wildcards={st.wildcards} manualQueue={st.manualQueue} liveGames={st.liveGames} gameHistory={st.gameHistory}/>}
      {tab==="payment"&&<PaymentTab teams={st.teams} wildcards={st.wildcards} paymentStatus={st.paymentStatus} dispatch={dispatch}/>}
      {tab==="admin"&&<AdminTab teams={st.teams} wildcards={st.wildcards} courts={st.courts} liveGames={st.liveGames} manualQueue={st.manualQueue} gameHistory={st.gameHistory} dispatch={dispatch}/>}
      {tab==="standings"&&<Card><div style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#ffffff"}}>Player standings</div><StandingsTable teams={st.teams} gameHistory={st.gameHistory} wildcards={st.wildcards}/></Card>}
    </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BadmintonApp));
</script>
<script>
function toggleFullscreen(){if(!document.fullscreenElement&&!document.webkitFullscreenElement){var el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}}
document.addEventListener('keydown',function(e){if(e.key==='F11'){e.preventDefault();toggleFullscreen();}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body></html>
